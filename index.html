<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard SE2026 Klungkung</title>
    <style>
        /* Remove default browser borders and scrollbars */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        /* Force the iframe to layer over the entire screen */
        iframe {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <iframe 
        src="https://se2026.testbox.web.id" 
        allow="fullscreen" 
        allowfullscreen>
    </iframe>

</body>
</html>
